# Render Blueprint — TalkTo APP AI (Docker 배포)
# 대시보드 → Blueprints → 이 저장소 연결하면 아래대로 생성된다.
# 시크릿(sync:false)은 커밋하지 않고 Render 대시보드/Secret에서 입력한다.
services:
  - type: web
    name: talkto-app-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    # free는 유휴 시 스핀다운(콜드스타트 ~1분) — BE가 호출하는 내부 서비스라 starter 권장.
    plan: starter
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "2"
      # ── 시크릿: 값은 Render 대시보드에서 입력(리포에 커밋 안 함) ──
      - key: AI_SERVER_TOKEN      # 미설정 시 인증 비활성 — 반드시 설정
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      # ── 모델(기본값 있음, 교체할 때만 지정) ──
      # 페르소나 응답 생성 모델. 정확성 평가(3.8~4.1)를 gpt-5.4-mini로 검증했으므로
      # 서빙도 동일 모델로 맞춤(config 기본값 gpt-4.1-mini보다 우선). 배포 후 대시보드
      # Environment에서 값만 바꿔 교체 가능(재빌드 불필요).
      - key: OPENAI_CHAT_MODEL
        value: gpt-5.4-mini
      # OPENAI_ANALYSIS_MODEL / OPENAI_JUDGE_MODEL 등은 config 기본값 사용,
      # 바꿀 때만 여기에 추가.
