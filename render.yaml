# Render Blueprint — TalkTo APP AI (Docker 배포)
# 대시보드 → Blueprints → 이 저장소 연결하면 아래대로 생성된다.
# 시크릿(sync:false)은 커밋하지 않고 Render 대시보드/Secret에서 입력한다.
services:
  - type: web
    name: talkto-app-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    # free는 유휴 시 스핀다운(콜드스타트 ~1분) — BE가 호출하는 내부 서비스라 starter 권장.
    plan: starter
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      # 화자식별(ECAPA/torch)이 워커당 메모리를 크게 쓰므로 1로 유지(2면 모델 2벌 →
      # OOM). torch 로딩 탓에 Standard(2GB) 이상 인스턴스 권장.
      - key: WEB_CONCURRENCY
        value: "1"
      # ── 시크릿: 값은 Render 대시보드에서 입력(리포에 커밋 안 함) ──
      - key: AI_SERVER_TOKEN      # 미설정 시 인증 비활성 — 반드시 설정
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      # 폴백 음성 id. 정석은 BE가 대상자별 voiceId를 요청에 실어 보내는 것이고, 그때는
      # 비워둬야 한다(voiceId 없는 요청이 엉뚱한 목소리 대신 400으로 실패하도록).
      #
      # [임시 — 단일 대상자(신금자) 데모용] BE가 클론 voiceId를 persona.voiceId에
      # 저장하지 못하는 동안(ver7 §5-1), BE는 자리표시자 'default-voice'를 보낸다.
      # 서버가 그걸 빈 값으로 보고 아래 id로 폴백해 고인 목소리로 합성한다.
      # 클론 자동화가 붙으면 이 값을 지우고 sync:false로 되돌릴 것.
      - key: ELEVENLABS_DEFAULT_VOICE_ID
        value: lTmcD2Kp43w1lHsMQmq7
      # ── 음성/모델(기본값 있음, 조절할 때만 지정) ──
      # TTS 말하기 속도(0.7~1.2, 낮을수록 느림). 대표 피드백 반영 0.9.
      - key: ELEVENLABS_SPEED
        value: "0.9"
      # ── 모델(기본값 있음, 교체할 때만 지정) ──
      # 페르소나 응답 생성 모델. 정확성 평가(3.8~4.1)를 gpt-5.4-mini로 검증했으므로
      # 서빙도 동일 모델로 맞춤(config 기본값 gpt-4.1-mini보다 우선). 배포 후 대시보드
      # Environment에서 값만 바꿔 교체 가능(재빌드 불필요).
      - key: OPENAI_CHAT_MODEL
        value: gpt-5.4-mini
      # OPENAI_ANALYSIS_MODEL / OPENAI_JUDGE_MODEL 등은 config 기본값 사용,
      # 바꿀 때만 여기에 추가.
